name: thix_id
description: "THIX ID is a robust digital identity platform designed for secure institutional and governmental use, offering comprehensive personal and enterprise profiles, multi-language support, and a suite of professional features."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  flutter_local_notifications: ^20.0.0
  firebase_messaging: ^16.0.0
  http: ^1.0.0
  video_player: '>=2.9.2'
  agora_rtc_engine: ^6.0.0
  flutter_webrtc: ^1.0.0
  barcode_widget: ^2.0.0
  fl_chart: 0.68.0
  nfc_manager: ^4.0.0
  path_provider: ^2.0.0
  permission_handler: ^12.0.0
  record: '>=5.1.2'
  geolocator: 13.0.4
  supabase_flutter: '>=1.10.0'
  share_plus: ^10.0.0
  printing: ^5.13.0
  pdf: ^3.11.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.0
  url_launcher: ^6.3.0
  file_picker: '>=8.1.2'
  firebase_storage: ^13.0.0
  cloud_firestore: '>=5.5.0'
  firebase_auth: '>=5.3.3'
  crypto: ^3.0.0
  shared_preferences: ^2.0.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.2
  go_router: ^16.2.0
  firebase_core: ^4.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/dreamflow_icon.jpg
  remove_alpha_ios: true
